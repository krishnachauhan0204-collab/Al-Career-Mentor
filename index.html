<!DOCTYPE html>
<html>
<head>
    <title>AI Career Mentor for Students</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎓 AI Career Mentor for Students</h1>

<p>Welcome! Find the best career based on your interests and skills.</p>

<h2>Enter Your Name</h2>

<input type="text" id="name" placeholder="Enter your name">

<button onclick="welcome()">Start</button>

<h2>Select Your Interest</h2>

<select id="interest">
    <option>Engineering</option>
    <option>Medical</option>
    <option>Commerce</option>
    <option>Arts</option>
    <option>Cyber Security</option>
</select>

<br><br>

<button onclick="career()">Get Career Suggestion</button>

<h2 id="result"></h2>

<script src="script.js"></script>

</body>
</html>
